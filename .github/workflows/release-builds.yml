name: Release Builds

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Collect executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/rhoiscribe.exe" "dist/rhoiscribe-windows-x86_64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/rhoiscribe-windows-x86_64.exe
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Collect executable
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/rhoiscribe dist/rhoiscribe-linux-x86_64
          chmod +x dist/rhoiscribe-linux-x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/rhoiscribe-linux-x86_64
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS universal
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build x86_64 release binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build aarch64 release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Collect universal executable
        shell: bash
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/rhoiscribe \
            target/aarch64-apple-darwin/release/rhoiscribe \
            -output dist/rhoiscribe-macos-universal
          chmod +x dist/rhoiscribe-macos-universal

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/rhoiscribe-macos-universal
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist

      - name: Generate release notes
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGE_RANGE="$PREVIOUS_TAG..$TAG_NAME"
            CHANGE_HEADING="Changes since \`$PREVIOUS_TAG\`:"
          else
            CHANGE_RANGE="$TAG_NAME"
            CHANGE_HEADING="Included changes:"
          fi

          {
            echo "## RHoiScribe $TAG_NAME"
            echo
            echo "RHoiScribe is a local MCP server for Hearts of Iron IV modding agents. Download the file for your platform, keep it in a stable folder, and use its path as the MCP server command."
            echo
            echo "### Downloads"
            echo
            echo "- Windows x86_64: \`rhoiscribe-windows-x86_64.exe\`"
            echo "- Linux x86_64: \`rhoiscribe-linux-x86_64\`"
            echo "- macOS universal: \`rhoiscribe-macos-universal\`"
            echo
            echo "On Linux or macOS, run \`chmod +x <downloaded-file>\` if your system asks for executable permission."
            echo
            echo "To print the command path for your MCP client, run the downloaded file with \`--print-command\`."
            echo
            echo "### Changes"
            echo
            echo "$CHANGE_HEADING"
            git log --no-merges --pretty=format:'- %s (%h)' "$CHANGE_RANGE"
            echo
          } > release-notes.md

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RHoiScribe $TAG_NAME" \
              --notes-file release-notes.md
          else
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RHoiScribe $TAG_NAME" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG_NAME" \
            dist/rhoiscribe-windows-x86_64.exe \
            dist/rhoiscribe-linux-x86_64 \
            dist/rhoiscribe-macos-universal \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
