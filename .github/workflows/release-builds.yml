name: Release Builds

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Collect executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/rhoiscribe.exe" "dist/rhoiscribe-windows-x86_64.exe"
          Copy-Item "resources/skill/SKILL.md" "dist/SKILL.md"
          Compress-Archive -Path "dist/rhoiscribe-windows-x86_64.exe", "dist/SKILL.md" -DestinationPath "dist/rhoiscribe-skill-windows-x86_64.zip" -Force
          Remove-Item "dist/SKILL.md"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/rhoiscribe-windows-x86_64.exe
            dist/rhoiscribe-skill-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Collect executable
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/rhoiscribe dist/rhoiscribe-linux-x86_64
          chmod +x dist/rhoiscribe-linux-x86_64
          cp resources/skill/SKILL.md dist/SKILL.md
          (cd dist && zip -9 rhoiscribe-skill-linux-x86_64.zip rhoiscribe-linux-x86_64 SKILL.md)
          rm dist/SKILL.md

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/rhoiscribe-linux-x86_64
            dist/rhoiscribe-skill-linux-x86_64.zip
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS universal
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build x86_64 release binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build aarch64 release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Collect universal executable
        shell: bash
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/rhoiscribe \
            target/aarch64-apple-darwin/release/rhoiscribe \
            -output dist/rhoiscribe-macos-universal
          chmod +x dist/rhoiscribe-macos-universal
          cp resources/skill/SKILL.md dist/SKILL.md
          (cd dist && zip -9 rhoiscribe-skill-macos-universal.zip rhoiscribe-macos-universal SKILL.md)
          rm dist/SKILL.md

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/rhoiscribe-macos-universal
            dist/rhoiscribe-skill-macos-universal.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist

      - name: Generate release notes
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGE_RANGE="$PREVIOUS_TAG..$TAG_NAME"
            CHANGE_HEADING="Changes since \`$PREVIOUS_TAG\`:"
          else
            CHANGE_RANGE="$TAG_NAME"
            CHANGE_HEADING="Included changes:"
          fi

          {
            echo "RHoiScribe is a local MCP server for Hearts of Iron IV modding agents. Download the file for your platform, keep it in a stable folder, and use its path as the MCP server command."
            echo
            echo "### Downloads"
            echo
            echo "Direct binaries:"
            echo
            echo "- Windows x86_64: \`rhoiscribe-windows-x86_64.exe\`"
            echo "- Linux x86_64: \`rhoiscribe-linux-x86_64\`"
            echo "- macOS universal: \`rhoiscribe-macos-universal\`"
            echo
            echo "Skill packages include \`SKILL.md\` and the matching executable:"
            echo
            echo "- Windows Skill package: \`rhoiscribe-skill-windows-x86_64.zip\`"
            echo "- Linux Skill package: \`rhoiscribe-skill-linux-x86_64.zip\`"
            echo "- macOS Skill package: \`rhoiscribe-skill-macos-universal.zip\`"
            echo
            echo "On Linux or macOS, run \`chmod +x <downloaded-file>\` if your system asks for executable permission."
            echo
            echo "To print the command path for your MCP client, run the downloaded file with \`--print-command\`. To use RHoiScribe from a Skill package without MCP setup, run \`--skill list-tools\`, \`--skill list-resources\`, or \`--skill list-prompts\`."
            echo
            echo "### Changes"
            echo
            echo "$CHANGE_HEADING"
            git log --no-merges --pretty=format:'- %s (%h)' "$CHANGE_RANGE"
            echo
          } > release-notes.md

      - name: Clean duplicate release body headings
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while IFS= read -r release_tag; do
            body_file="$(mktemp)"
            gh release view "$release_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json body \
              --jq '.body' > "$body_file"

            changed="$(python3 -c 'from pathlib import Path; import re; import sys; path = Path(sys.argv[1]); body = path.read_text(encoding="utf-8"); cleaned = re.sub(r"\A## RHoiScribe v[0-9][^\r\n]*(?:\r?\n){1,2}", "", body, count=1); path.write_text(cleaned, encoding="utf-8"); print("yes" if cleaned != body else "no")' "$body_file")"

            if [ "$changed" = "yes" ]; then
              gh release edit "$release_tag" \
                --repo "$GITHUB_REPOSITORY" \
                --notes-file "$body_file"
            fi

            rm -f "$body_file"
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName')

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RHoiScribe $TAG_NAME" \
              --notes-file release-notes.md
          else
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RHoiScribe $TAG_NAME" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG_NAME" \
            dist/rhoiscribe-windows-x86_64.exe \
            dist/rhoiscribe-linux-x86_64 \
            dist/rhoiscribe-macos-universal \
            dist/rhoiscribe-skill-windows-x86_64.zip \
            dist/rhoiscribe-skill-linux-x86_64.zip \
            dist/rhoiscribe-skill-macos-universal.zip \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
