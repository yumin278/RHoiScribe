[package]
name = "rchadow"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-only"
description = "A Rust library for managing game playsets and launching supported games."
readme = "README.md"
keywords = ["launcher", "playset", "modding", "hoi4"]
categories = ["game-development", "filesystem"]

[lib]
name = "rchadow"
path = "src/lib.rs"

[features]
default = []
rnmdb = []

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
directories = "6"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
walkdir = "2"

[dev-dependencies]
tempfile = "3"
